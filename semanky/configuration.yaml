homeassistant:
  name: Semanky
  unit_system: metric
  country: CZ
  time_zone: Europe/Prague

# Energy prices for Solar Optimizer
input_number:
  energy_buy_price:
    name: "Cena nakupu elektriny (CZK/kWh)"
    min: 0
    max: 20
    step: 0.01
    unit_of_measurement: "CZK/kWh"
    icon: mdi:currency-usd
  energy_sell_price:
    name: "Cena prodeje elektriny (CZK/kWh)"
    min: 0
    max: 20
    step: 0.01
    unit_of_measurement: "CZK/kWh"
    icon: mdi:transmission-tower-export
  energy_sell_tax_percent:
    name: "Dan z prodeje elektriny (%)"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:percent

# Utility meter
utility_meter:
  grid_export_energy_daily:
    source: sensor.shelly_pro3em_total_active_returned_energy
    cycle: daily
  grid_import_energy_daily:
    source: sensor.shelly_pro3em_total_active_energy
    cycle: daily
  battery_charge_daily:
    source: sensor.growatt_battery_charge_total
    cycle: daily

sensor:
  - platform: history_stats
    name: Cerpadlo run time
    entity_id: binary_sensor.gbo_k1_pool_pump
    state: "on"
    type: time
    start: "{{ today_at() }}"
    end: "{{ now() }}"

  # Battery charge total energy - integrated from existing battery_charge_power sensor
  # sensor.growatt_battery_battery_charge_power is always positive (charging only)
  - platform: integration
    source: sensor.growatt_battery_battery_charge_power
    name: Growatt Battery Charge Total
    unique_id: growatt_battery_charge_total
    unit_prefix: k
    unit_time: h
    round: 3
    method: trapezoidal

# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

modbus: !include modbus.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include template.yaml
