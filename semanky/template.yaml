- sensor:
  - name: pool pump icon
    state: >-
      {% if is_state('binary_sensor.gbo_k1_pool_pump', 'on') %}
        mdi:water-pump
      {% else %}
        mdi:water-pump-off
      {% endif %}

  - name: boiler icon
    state: >-
      {% if states('sensor.greenbono_ssr_boiler_output') | float(0) > 0 %}
        mdi:water-boiler
      {% else %}
        mdi:water-boiler-off
      {% endif %}

  - name: "Mycka icon"
    state: >-
      {% if is_state('switch.mycka', 'on') %}
        mdi:dishwasher
      {% else %}
        mdi:dishwasher-off
      {% endif %}

  # Battery current calculated as power / voltage
  # Positive = discharge, negative = charge (matches battery_power after invert_power: true)
  - name: "Growatt Battery Current Calculated"
    unique_id: growatt_battery_current_calculated
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    state: >-
      {% set power = states('sensor.growatt_battery_battery_power') | float(0) %}
      {% set voltage = states('sensor.growatt_battery_battery_voltage') | float(0) %}
      {% if voltage > 0 %}
        {{ (power / voltage * -1) | round(1) }}
      {% else %}
        0
      {% endif %}

  # Solar Optimizer: battery net power (positive=discharge, negative=charge)
  # Sign chain:
  #   SPF hardware modbus:  +discharge / -charge
  #   growatt integration:  inverts via scale=-0.1 → +charge / -discharge  (HA standard)
  #   Solar Optimizer needs: +discharge / -charge  → invert again * -1
  - name: "Growatt Battery Net Power SO"
    unique_id: growatt_battery_net_power_so
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    state: >-
      {{ (states('sensor.growatt_battery_battery_power') | float(0) * -1) | round(1) }}

  # GBO dovoleny odber ze site - horni byte EEUdcPIParam (addr 100)
  # Nelinearni scale: hi=139 ~ 12.14A, hi=129 ~ 15.06A
  # Pouze pro monitoring - pro zapis pouzij GreenBono HMI
  - name: "GBO Grid Import Limit Raw"
    unique_id: gbo_grid_import_limit_raw
    state_class: measurement
    icon: mdi:transmission-tower-import
    state: >-
      {{ ((states('sensor.gbo_eeudcpiparam_raw') | int(0)) // 256) | bitwise_and(255) }}

  # GBO max proud invertoru - prepocet z raw hi byte
  # Vzorec odvozen z mereni: hi=129→15.06A, hi=139→12.14A
  # A = 52.728 - 0.292 × hi  (pozor: pouze 2 body, nelinearita mozna mimo rozsah)
  - name: "GBO Inverter Current Limit"
    unique_id: gbo_inverter_current_limit
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    icon: mdi:transmission-tower-import
    state: >-
      {{ (52.728 - 0.292 * (states('sensor.gbo_grid_import_limit_raw') | float(0))) | round(1) }}

  # GBO max nabijeci proud baterie - horni byte EEIzadLimit (addr 102)
  # scale: 1 digit = 0.4 A
  - name: "GBO Battery Charge Current Limit"
    unique_id: gbo_battery_charge_current_limit
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    icon: mdi:current-dc
    state: >-
      {{ ((((states('sensor.gbo_eeizadlimit_raw') | int(0)) // 256) | bitwise_and(255)) * 0.4) | round(1) }}

  # GBO SOC* regulační cíl - dolní byte EEUdcZadaná (addr 98)
  # Hodnota 0-255 odpovídá 0-100% SOC
  - name: "GBO SOC Target"
    unique_id: gbo_soc_target
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    icon: mdi:battery-charging-90
    state: >-
      {{ (states('sensor.gbo_eeudczadana_raw') | int(0)) | bitwise_and(255) }}


- binary_sensor:
  # GBO K1 Pool Pump (bit 0 of RelaisStatus reg 10)
  - name: "GBO K1 Pool Pump"
    unique_id: gbo_k1_pool_pump
    device_class: running
    state: >-
      {{ (states('sensor.gbo_relay_status_raw') | int(0) | bitwise_and(1)) > 0 }}

  # GBO K2 Pool Heating (bit 1 of RelaisStatus reg 10)
  - name: "GBO K2 Pool Heating"
    unique_id: gbo_k2_pool_heating
    device_class: running
    state: >-
      {{ (states('sensor.gbo_relay_status_raw') | int(0) | bitwise_and(2)) > 0 }}

- sensor:
  # GBO SSR Boiler Output - register 18: upper byte = SamplesCnt, lower byte = OutputPI
  # 100% = oba SSR na plno (2 * SamplesCnt), >100% = PI regulátor saturován
  - name: "GBO SSR Boiler Output"
    unique_id: gbo_ssr_boiler_output
    unit_of_measurement: "%"
    device_class: power_factor
    state_class: measurement
    icon: mdi:water-boiler
    state: >-
      {% set raw = states('sensor.gbo_ssr_raw') | int(0) %}
      {% set samples = raw // 256 %}
      {% set fires = raw % 256 %}
      {% if samples > 0 %}
        {{ (fires / (2 * samples) * 100) | round(0) }}
      {% else %}0{% endif %}

  # GBO SSR1 - bojler ~2.2 kW (0-100%, saturates at SamplesCnt)
  - name: "GBO SSR1 Output"
    unique_id: gbo_ssr1_output
    unit_of_measurement: "%"
    state_class: measurement
    icon: mdi:water-boiler
    state: >-
      {% set raw = states('sensor.gbo_ssr_raw') | int(0) %}
      {% set samples = raw // 256 %}
      {% set fires = raw % 256 %}
      {% if samples > 0 %}
        {{ ([fires, samples] | min / samples * 100) | round(0) }}
      {% else %}0{% endif %}

  # GBO SSR2 - spirála ~1.8 kW (0-100%, starts after SSR1 saturates)
  - name: "GBO SSR2 Output"
    unique_id: gbo_ssr2_output
    unit_of_measurement: "%"
    state_class: measurement
    icon: mdi:heating-coil
    state: >-
      {% set raw = states('sensor.gbo_ssr_raw') | int(0) %}
      {% set samples = raw // 256 %}
      {% set fires = raw % 256 %}
      {% if samples > 0 %}
        {{ ([[fires - samples, 0] | max, samples] | min / samples * 100) | round(0) }}
      {% else %}0{% endif %}
