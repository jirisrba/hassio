- sensor:
  # Pool pump running power estimate
  - name: "Pool pump power"
    unit_of_measurement: W
    state: >-
      {% if is_state('binary_sensor.greenbono_k1_pool_pump', 'on') %}
        450
      {% else %}
        0
      {% endif %}

  - name: pool pump icon
    state: >-
      {% if is_state('binary_sensor.greenbono_k1_pool_pump', 'on') %}
        mdi:water-pump
      {% else %}
        mdi:water-pump-off
      {% endif %}

  - name: boiler icon
    state: >-
      {% if states('sensor.greenbono_ssr_boiler_output') | float(0) > 0 %}
        mdi:water-boiler
      {% else %}
        mdi:water-boiler-off
      {% endif %}

  - name: "Mycka icon"
    state: >-
      {% if is_state('switch.mycka', 'on') %}
        mdi:dishwasher
      {% else %}
        mdi:dishwasher-off
      {% endif %}

  # Battery current calculated from power/voltage (SPF hw limitation: reg 68 only works during AC charging)
  # Positive = charge, negative = discharge (matches battery_power sign convention)
  - name: "Growatt Battery Current Calculated"
    unique_id: growatt_battery_current_calculated
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    state: >-
      {% set voltage = states('sensor.growatt_battery_battery_voltage') | float(0) %}
      {% set power = states('sensor.growatt_battery_battery_power') | float(0) %}
      {% if voltage > 0 %}
        {{ (power / voltage * -1) | round(1) }}
      {% else %}
        0
      {% endif %}

  # Solar Optimizer: battery net power (positive=discharge, negative=charge)
  # Sign chain:
  #   SPF hardware modbus:  +discharge / -charge
  #   growatt integration:  inverts via scale=-0.1 → +charge / -discharge  (HA standard)
  #   Solar Optimizer needs: +discharge / -charge  → invert again * -1
  - name: "Growatt Battery Net Power SO"
    unique_id: growatt_battery_net_power_so
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    state: >-
      {{ (states('sensor.growatt_battery_battery_power') | float(0) * -1) | round(1) }}
