####################################
###   GBO-Aku (GreenBono)        ###
####################################
# Modbus RTU over TCP via WiFi module
# Slave address: 1 (default)
# RAM registers (addr 0-19): unlimited writes
# EEPROM registers (addr 20+): limited writes, requires confirmation packet to addr 76 (0x55AA)
- name: greenbono
  type: tcp
  host: 192.168.2.XXX  # TODO: doplnit IP WiFi modulu
  port: 6770
  message_wait_milliseconds: 350  # GBO-Aku doc: min 350ms response window

  sensors:
    # Current L1 (kalibrovaná hodnota) [deciAmpéry]
    - name: GBO Current L1
      unique_id: gbo_current_l1
      device_class: current
      unit_of_measurement: A
      slave: 1
      address: 8
      input_type: input
      data_type: int16
      scale: 0.1
      precision: 1

    # Voltage L1
    - name: GBO Voltage L1
      unique_id: gbo_voltage_l1
      device_class: voltage
      unit_of_measurement: V
      slave: 1
      address: 16
      input_type: input
      data_type: uint16
      precision: 0

    # SSR boiler output - lower byte of reg 18 (0-255 = 0-100% výkon SSR)
    # Pozor: horní byte je SamplesCnt - nutno maskovat
    - name: GBO SSR Boiler Output
      unique_id: gbo_ssr_boiler_output
      unit_of_measurement: "%"
      icon: mdi:water-boiler
      slave: 1
      address: 18
      input_type: input
      data_type: uint16
      bitmask: 0x00FF
      # 0-255 → 0-100%
      scale: 0.392
      precision: 0

    # ExternControl - aktuální hodnota (pro diagnostiku)
    # 0x3F00=16128 regulace, 0xBF00=49152 vše zapnuto, 0x7F00=32512 vše vypnuto
    - name: GBO Extern Control State
      unique_id: gbo_extern_control_state
      slave: 1
      address: 14
      input_type: holding
      data_type: uint16
      entity_category: diagnostic

  binary_sensors:
    # Relay K1 = Pool pump (bit 0 holding reg 10 RelaisStatus)
    - name: GBO K1 Pool Pump
      unique_id: gbo_k1_pool_pump
      slave: 1
      address: 10
      input_type: holding
      device_class: running
      bitmask: 0x0001

    # Relay K2 = Pool heating (bit 1)
    - name: GBO K2 Pool Heating
      unique_id: gbo_k2_pool_heating
      slave: 1
      address: 10
      input_type: holding
      device_class: running
      bitmask: 0x0002

  switches:
    # ExternControl - Solar Optimizer / ruční override
    # Zapnuto = regulace (GBO řídí SSR autonomně dle přebytků)
    # Vypnuto = vše vypnuto (bojler off)
    # Zápis do RAM (addr 14) = neomezený počet zápisů!
    - name: GBO Boiler Enable
      unique_id: gbo_boiler_enable
      slave: 1
      address: 14
      write_type: holding
      command_on: 16128   # 0x3F00 = regulace (GBO solar router mód)
      command_off: 32512  # 0x7F00 = vypnout vše
