####################################
###   GBO-Aku (GreenBono)        ###
####################################
# Modbus RTU over TCP via WiFi module
# Slave address: 1 (default)
# RAM registers (addr 0-19): unlimited writes
# EEPROM registers (addr 20+): limited writes, requires confirmation packet to addr 76 (0x55AA)
- name: greenbono
  type: rtuovertcp
  host: 192.168.2.18
  port: 6770
  message_wait_milliseconds: 350  # GBO-Aku doc: min 350ms response window
  timeout: 3                       # seconds, RTU over TCP needs extra time
  scan_interval: 600               # every 10 min - avoid collisions with GBO↔inverter traffic

  sensors:
    # Current L1 (kalibrovaná hodnota) [deciAmpéry]
    - name: GBO Current L1
      unique_id: gbo_current_l1
      device_class: current
      unit_of_measurement: A
      slave: 3
      address: 8
      input_type: input
      data_type: int16
      scale: 0.1
      precision: 1

    # Voltage L1
    - name: GBO Voltage L1
      unique_id: gbo_voltage_l1
      device_class: voltage
      unit_of_measurement: V
      slave: 3
      address: 16
      input_type: input
      data_type: uint16
      precision: 0

    # SSR boiler output - reg 18: lower byte = SSR output (0-255), upper byte = SamplesCnt
    # bitmask not supported in HA modbus - read raw, template sensor extracts lower byte
    - name: GBO SSR Raw
      unique_id: gbo_ssr_raw
      slave: 3
      address: 18
      input_type: input
      data_type: uint16
      precision: 0

    # ExternControl - aktuální hodnota (pro diagnostiku)
    # 0x3F00=16128 regulace, 0xBF00=49152 vše zapnuto, 0x7F00=32512 vše vypnuto
    - name: GBO Extern Control State
      unique_id: gbo_extern_control_state
      slave: 3
      address: 14
      input_type: holding
      data_type: uint16

    # RelaisStatus - raw hodnota pro template binary_sensors
    - name: GBO Relay Status Raw
      unique_id: gbo_relay_status_raw
      slave: 3
      address: 10
      input_type: holding
      data_type: uint16

  binary_sensors: []
  # Note: K1/K2 relay status handled via template binary_sensors in template.yaml
  # RelaisStatus holding reg 10: bit0=K1, bit1=K2, bit2=K3

  switches:
    # ExternControl - Solar Optimizer / ruční override
    # Zapnuto = regulace (GBO řídí SSR autonomně dle přebytků)
    # Vypnuto = vše vypnuto (bojler off)
    # Zápis do RAM (addr 14) = neomezený počet zápisů!
    - name: GBO Enable All
      unique_id: gbo_enable_all
      slave: 3
      address: 14
      write_type: holding
      command_on: 16128   # 0x3F00 = regulace (GBO solar router mód)
      command_off: 32512  # 0x7F00 = vypnout vše
