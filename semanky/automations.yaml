---
# automations.yaml

- id: switch_mycka
  alias: "Switch mycka on/off"
  description: "Switch mycka: SOC-based, forced ON at 12:00, SOC check at 20:00"
  trigger:
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      above: 50
      id: switch_mycka_on
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      below: 35
      id: switch_mycka_off
    - platform: time
      at: "12:00:00"
      id: switch_mycka_noon
    - platform: time
      at: "22:00:00"
      id: switch_mycka_evening
  condition:
    - condition: numeric_state
      entity_id: sensor.mycka_power
      below: 10
  action:
    - choose:
      - conditions:
          - condition: trigger
            id: switch_mycka_on
        sequence:
          - service: switch.turn_on
            entity_id: switch.mycka
      - conditions:
          - condition: trigger
            id: switch_mycka_off
          # SOC vypnutí jen mimo poledne-večer
          - condition: time
            after: "20:00:00"
            before: "12:00:00"
        sequence:
          - service: switch.turn_off
            entity_id: switch.mycka
      - conditions:
          - condition: trigger
            id: switch_mycka_noon
        sequence:
          - service: switch.turn_on
            entity_id: switch.mycka
      - conditions:
          - condition: trigger
            id: switch_mycka_evening
          - condition: numeric_state
            entity_id: sensor.growatt_battery_battery_soc
            below: 50
        sequence:
          - service: switch.turn_off
            entity_id: switch.mycka

- id: gbo_modbus_stop_sunset
  alias: "GBO modbus stop - sunset -1h"
  trigger:
    - platform: sun
      event: sunset
      offset: "-02:00:00"
  action:
    - action: modbus.stop
      data:
        hub: greenbono

- id: gbo_modbus_start_sunrise
  alias: "GBO modbus start - sunrise +3h"
  trigger:
    - platform: sun
      event: sunrise
      offset: "+03:00:00"
  action:
    - action: modbus.reload

# =============================================================================
# BOJLER - INSPIRACE (zatím neaktivní, odkomentuj až budeš chtít použít)
# =============================================================================

# Strategie 1: Dump load — bojler jako přebytek když je baterka plná
# Logika: SOC >= 95 % → zapnout bojler, SOC < 85 % → vypnout
# Vhodné pro: maximální využití solaru, baterka má přednost

- id: boiler_dump_load
  alias: "Boiler - dump load when battery full"
  description: "Use boiler as dump load when battery SOC >= 95%"
  trigger:
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      above: 95
      for:
        minutes: 2
      id: boiler_on
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      below: 85
      id: boiler_off
  condition:
    - condition: numeric_state
      entity_id: sensor.siton210_temperature
      below: 70                          # nepřehřívat
  action:
    - choose:
      - conditions:
          - condition: trigger
            id: boiler_on
        sequence:
          - service: switch.turn_on
            entity_id: switch.greenbono_ssr_boiler
      - conditions:
          - condition: trigger
            id: boiler_off
        sequence:
          - service: switch.turn_off
            entity_id: switch.greenbono_ssr_boiler
