---
# automations.yaml

- id: limit_inverter_power
  alias: "Limit inverter power"
  description: "Limit inverter output power based on boiler temperature and washing machine"
  trigger:
    # full power when washing machine is running
    - platform: numeric_state
      entity_id: sensor.shelly_pro3em_phase_c_active_power
      above: 1000
      for:
        minutes: 1
      id: limit_to_50pct
    # reduce power as boiler heats up
    - platform: numeric_state
      entity_id: sensor.siton210_temperature
      above: 55
      for:
        minutes: 1
      id: limit_to_37pct
    - platform: numeric_state
      entity_id: sensor.siton210_temperature
      above: 65
      for:
        minutes: 1
      id: limit_to_20pct
    - platform: numeric_state
      entity_id: sensor.siton210_temperature
      above: 70
      for:
        minutes: 1
      id: limit_to_8pct
    # restore full power when boiler is cool
    - platform: numeric_state
      entity_id: sensor.siton210_temperature
      below: 50
      for:
        minutes: 1
      id: full_power
    # overheated boiler (K3 relay = safety cutoff)
    - platform: state
      entity_id: binary_sensor.greenbono_k3_relay_status
      to: 'on'
      id: limit_to_8pct
  condition:
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"
  action:
    - choose:
      - conditions:
          - condition: trigger
            id: limit_to_50pct
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "50"
      - conditions:
          - condition: trigger
            id: limit_to_37pct
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "37"
      - conditions:
          - condition: trigger
            id: limit_to_20pct
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "20"
      - conditions:
          - condition: trigger
            id: limit_to_8pct
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "8"
      - conditions:
          - condition: trigger
            id: full_power
          - condition: numeric_state
            entity_id: sensor.energy_production_today
            below: 14
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "43"
      - conditions:
          - condition: trigger
            id: full_power
          - condition: numeric_state
            entity_id: sensor.energy_production_today
            above: 14
        sequence:
          - service: number.set_value
            target:
              entity_id: number.growatt_active_power_rate
            data:
              value: "37"
  mode: single

- id: switch_on_inverter
  alias: "Switch on inverter"
  description: "Switch on inverter when solar prediction is higher than threshold"
  trigger:
    - platform: numeric_state
      entity_id: sensor.energy_current_hour
      above: 0.2
  condition:
    - condition: sun
      after: sunrise
    - condition: time
      before: '12:00:00'
    - condition: state
      entity_id: switch.growatt_inverter_power
      state: 'off'
  action:
    - service: switch.turn_on
      entity_id: switch.growatt_inverter_power
  mode: single

- id: switch_off_inverter
  alias: "Switch off inverter"
  description: "Switch off inverter when solar remaining energy is lower than threshold"
  trigger:
    - platform: numeric_state
      entity_id: sensor.energy_current_hour
      below: 0.3
    - platform: numeric_state
      entity_id: sensor.energy_production_today_remaining
      below: 0.3
    - platform: numeric_state
      entity_id: sensor.growatt_pv1_power
      below: 200
      for:
        minutes: 10
    - platform: sun
      event: sunset
  condition:
    - condition: time
      after: '17:00:00'
    - condition: sun
      before: sunset
    - condition: state
      entity_id: switch.growatt_inverter_power
      state: 'on'
  action:
    - service: switch.turn_off
      entity_id: switch.growatt_inverter_power
  mode: single

- id: switch_mycka
  alias: "Switch mycka on/off"
  description: "Switch mycka on/off based on inverter power"
  trigger:
    - platform: numeric_state
      entity_id: sensor.growatt_load_power
      above: 1200
      for:
        minutes: 5
      id: switch_mycka_on
    - platform: numeric_state
      entity_id: sensor.growatt_load_power
      below: 1000
      for:
        minutes: 10
      id: switch_mycka_off
    - platform: numeric_state
      entity_id: sensor.energy_next_hour
      below: 1
      id: switch_mycka_off
  condition:
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"
    - condition: numeric_state
      entity_id: sensor.mycka_power
      below: 10
  action:
    - choose:
      - conditions:
          - condition: trigger
            id: switch_mycka_on
        sequence:
          - service: switch.turn_on
            entity_id: switch.mycka
      - conditions:
          - condition: trigger
            id: switch_mycka_off
        sequence:
          - service: switch.turn_off
            entity_id: switch.mycka
