type: vertical-stack
cards:
  - type: custom:mushroom-template-card
    primary: Bojler
    secondary: >-
      {% set pct = states('sensor.gbo_ssr_boiler_output') | float(0) %}
      {% if pct > 0 %}Ohřev: {{ pct | round(0) }}%{% else %}Vypnuto{% endif %}
    icon: >-
      {% if states('sensor.gbo_ssr_boiler_output') | float(0) > 0 %}
        mdi:water-boiler
      {% else %}
        mdi:water-boiler-off
      {% endif %}
    icon_color: >-
      {% set pct = states('sensor.gbo_ssr_boiler_output') | float(0) %}
      {% if pct > 80 %}red{% elif pct > 30 %}orange{% elif pct > 0 %}yellow{% else %}lightgray{% endif %}
    badge_icon: >-
      {% if states('sensor.gbo_ssr_boiler_output') | float(0) > 0 %}mdi:fire{% else %}mdi:sleep{% endif %}
    badge_color: >-
      {% if states('sensor.gbo_ssr_boiler_output') | float(0) > 0 %}orange{% else %}gray{% endif %}

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Teplota vody
        secondary: "{{ states('sensor.siton210_temperature') }} °C"
        icon: mdi:thermometer-water
        icon_color: >-
          {% set t = states('sensor.siton210_temperature') | float(0) %}
          {% if t > 60 %}red{% elif t > 45 %}orange{% elif t > 35 %}yellow{% else %}blue{% endif %}

      - type: custom:mushroom-template-card
        primary: SSR výkon
        secondary: "{{ states('sensor.gbo_ssr_boiler_output') | round(0) }} %"
        icon: mdi:percent-circle
        icon_color: >-
          {% if states('sensor.gbo_ssr_boiler_output') | float(0) > 0 %}orange{% else %}lightgray{% endif %}

  - type: gauge
    entity: sensor.gbo_ssr_boiler_output
    name: SSR relé
    unit: "%"
    min: 0
    max: 100
    needle: true
    segments:
      - from: 0
        color: "#4CAF50"
      - from: 30
        color: "#FFC107"
      - from: 70
        color: "#F44336"

  - type: custom:mushroom-template-card
    primary: Dnes běžel
    secondary: "{{ states('sensor.bojler_beh_dnes') | float(0) | round(2) }} h"
    icon: mdi:clock-outline
    icon_color: >-
      {% set h = states('sensor.bojler_beh_dnes') | float(0) %}
      {% if h > 2 %}green{% elif h > 0 %}orange{% else %}lightgray{% endif %}
