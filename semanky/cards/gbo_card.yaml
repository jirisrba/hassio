type: vertical-stack
cards:
  # === HLAVIČKA ===
  - type: custom:mushroom-template-card
    primary: >-
      {% set s = states('sensor.growatt_status') | int(-1) %}
      {% if s == 0 %}Growatt: Standby
      {% elif s == 2 %}Growatt: Vybíjení
      {% elif s == 3 %}Growatt: Chyba
      {% elif s == 5 %}Growatt: Nabíjení FV
      {% elif s == 6 %}Growatt: Nabíjení AC
      {% elif s == 7 %}Growatt: Komb. nabíjení
      {% elif s == 8 %}Growatt: Komb. nab.+Bypass
      {% elif s == 9 %}Growatt: FV nab.+Bypass
      {% elif s == 10 %}Growatt: AC nab.+Bypass
      {% elif s == 11 %}Growatt: Bypass
      {% elif s == 12 %}Growatt: FV nab.+Vybíjení
      {% else %}Growatt: {{ states('sensor.growatt_status') }}{% endif %}

    icon: mdi:solar-power-variant
    icon_color: >-
      {% set state = states('sensor.gbo_extern_control_state') | int(0) %}
      {% if state == 16128 %}green{% elif state == 49152 %}orange{% else %}red{% endif %}
    badge_icon: >-
      {% set soc = states('sensor.gbo_battery_soc') | float(0) %}
      {% if soc > 80 %}mdi:battery-high
      {% elif soc > 40 %}mdi:battery-medium
      {% else %}mdi:battery-low{% endif %}
    badge_color: >-
      {% set soc = states('sensor.gbo_battery_soc') | float(0) %}
      {% if soc > 80 %}green{% elif soc > 40 %}orange{% else %}red{% endif %}

  # === BATERIE ===
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: SOC baterie
        secondary: "{{ states('sensor.gbo_battery_soc') }} %"
        icon: >-
          {% set soc = states('sensor.gbo_battery_soc') | float(0) %}
          {% if soc > 80 %}mdi:battery-high
          {% elif soc > 40 %}mdi:battery-medium
          {% else %}mdi:battery-low{% endif %}
        icon_color: >-
          {% set soc = states('sensor.gbo_battery_soc') | float(0) %}
          {% if soc > 80 %}green{% elif soc > 40 %}orange{% else %}red{% endif %}

      - type: custom:mushroom-template-card
        primary: SOC Growatt
        secondary: "{{ states('sensor.growatt_battery_battery_soc') }} %"
        icon: mdi:battery-charging
        icon_color: >-
          {% set soc = states('sensor.growatt_battery_battery_soc') | float(0) %}
          {% if soc > 80 %}green{% elif soc > 40 %}orange{% else %}red{% endif %}

  - type: gauge
    entity: sensor.gbo_battery_soc
    name: SOC baterie (GBO)
    unit: "%"
    min: 0
    max: 100
    needle: true
    segments:
      - from: 0
        color: "#F44336"
      - from: 25
        color: "#FFC107"
      - from: 50
        color: "#4CAF50"
      - from: 90
        color: "#2196F3"

  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.gbo_ssr1_output
        name: SSR1 Bojler
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 30
            color: "#FFC107"
          - from: 70
            color: "#F44336"

      - type: gauge
        entity: sensor.gbo_ssr2_output
        name: SSR2 Spirála
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 30
            color: "#FFC107"
          - from: 70
            color: "#F44336"

  # === NAPĚTÍ A PROUD BATERIE ===
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Napětí baterie
        secondary: "{{ states('sensor.growatt_battery_battery_voltage') }} V"
        icon: mdi:flash-triangle
        icon_color: gray

      - type: custom:mushroom-template-card
        primary: Proud baterie
        secondary: >-
          {% set i = states('sensor.growatt_battery_current_calculated') | float(0) %}
          {% if i > 0 %}+{{ i | round(1) }} A (vybíjení)
          {% else %}{{ i | round(1) }} A (nabíjení){% endif %}
        icon: mdi:current-dc
        icon_color: >-
          {% set i = states('sensor.growatt_battery_current_calculated') | float(0) %}
          {% if i > 0 %}orange{% else %}green{% endif %}

      - type: custom:mushroom-template-card
        primary: Výkon baterie
        secondary: >-
          {% set p = states('sensor.growatt_battery_battery_power') | float(0) %}
          {% if p > 0 %}-{{ p | round(0) }} W (nabíjení)
          {% else %}+{{ (p | abs) | round(0) }} W (vybíjení){% endif %}
        icon: >-
          {% set p = states('sensor.growatt_battery_battery_power') | float(0) %}
          {% if p > 0 %}mdi:battery-charging{% else %}mdi:battery-minus{% endif %}
        icon_color: >-
          {% set p = states('sensor.growatt_battery_battery_power') | float(0) %}
          {% if p > 0 %}green{% else %}orange{% endif %}

  # === SÍŤ L1 ===
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Napětí AC
        secondary: "{{ states('sensor.growatt_load_ac_voltage') }} V"
        icon: mdi:sine-wave
        icon_color: blue

      - type: custom:mushroom-template-card
        primary: Proud AC
        secondary: "{{ states('sensor.growatt_solar_ac_current') }} A"
        icon: mdi:current-ac
        icon_color: blue

      - type: custom:mushroom-template-card
        primary: Výkon AC
        secondary: "{{ states('sensor.growatt_solar_ac_power') }} W"
        icon: mdi:lightning-bolt
        icon_color: >-
          {% set p = states('sensor.growatt_solar_ac_power') | float(0) %}
          {% if p > 2000 %}orange{% elif p > 500 %}yellow{% else %}gray{% endif %}

  # === SSR A RELÉ ===
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Myčka
        secondary: >-
          {% set p = states('sensor.mycka_power') | float(0) %}
          {% if is_state('switch.mycka', 'on') %}Zapnuto ({{ p | round(0) }} W){% else %}Vypnuto{% endif %}
        icon: "{{ states('sensor.mycka_icon') }}"
        icon_color: >-
          {% if is_state('switch.mycka', 'on') %}blue{% else %}lightgray{% endif %}

      - type: custom:mushroom-template-card
        primary: Teplota vody
        secondary: "{{ states('sensor.siton210_temperature') }} °C"
        icon: mdi:thermometer-water
        icon_color: >-
          {% set t = states('sensor.siton210_temperature') | float(0) %}
          {% if t > 60 %}red{% elif t > 45 %}orange{% elif t > 35 %}yellow{% else %}blue{% endif %}

      - type: custom:mushroom-template-card
        primary: K1 Čerpadlo
        secondary: >-
          {% if is_state('binary_sensor.gbo_k1_pool_pump', 'on') %}Zapnuto{% else %}Vypnuto{% endif %}
        icon: mdi:water-pump
        icon_color: >-
          {% if is_state('binary_sensor.gbo_k1_pool_pump', 'on') %}blue{% else %}lightgray{% endif %}

      - type: custom:mushroom-template-card
        primary: K2 Ohřev
        secondary: >-
          {% if is_state('binary_sensor.gbo_k2_pool_heating', 'on') %}Zapnuto{% else %}Vypnuto{% endif %}
        icon: mdi:heat-pump
        icon_color: >-
          {% if is_state('binary_sensor.gbo_k2_pool_heating', 'on') %}red{% else %}lightgray{% endif %}

  # === KONFIGURACE ===
  - type: custom:mushroom-template-card
    primary: Konfigurace GBO
    secondary: >-
      SOC*: {{ states('sensor.gbo_soc_target') }}%  |
      I bat: {{ states('sensor.gbo_battery_charge_current_limit') }} A  |
      I inv: {{ states('sensor.gbo_inverter_current_limit') }} A
    icon: mdi:cog
    icon_color: gray
    tap_action:
      action: more-info
      entity: sensor.gbo_soc_target
