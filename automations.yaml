---
# automations.yaml

- id: switch_mycka_on
  alias: "Mycka - zapni"
  description: "Zapni mycku kdyz SOC > 50, v poledne, nebo solar > 1kW po dobu 5 min"
  trigger:
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      above: 50
    - platform: time
      at: "12:00:00"
    - platform: numeric_state
      entity_id: sensor.growatt_solar_solar_total_power
      above: 1500
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: switch.mycka
      state: "off"
  action:
    - service: switch.turn_on
      entity_id: switch.mycka

- id: switch_mycka_off
  alias: "Mycka - vypni"
  description: "Vypni mycku kdyz SOC < 35 v noci (20:00-12:00)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.growatt_battery_battery_soc
      below: 35
  condition:
    - condition: state
      entity_id: switch.mycka
      state: "on"
    - condition: numeric_state
      entity_id: sensor.mycka_power
      below: 10
  action:
    - service: switch.turn_off
      entity_id: switch.mycka

# =============================================================================
# WATCHDOG - RS485 prevodnik restart
# Pokud je sensor nedostupny 5+ minut a switch.gbo je zapnuty,
# provede restart vypnutim/zapnutim switch.gbo (power-cycle prevodniku).
# mode: single zajisti ze bezi max jeden restart najednou.
# =============================================================================

- id: watchdog_rs485_growatt
  alias: "Watchdog - RS485 restart (Growatt SOC nedostupny)"
  description: >
    Pokud je sensor.growatt_battery_battery_soc nedostupny 5 minut,
    restartuje modbus TCP/RTU bridge pres button.
  trigger:
    - platform: state
      entity_id: sensor.growatt_battery_battery_soc
      to: "unavailable"
      for:
        minutes: 5
  condition: []
  action:
    - alias: "Loguj restart"
      service: system_log.write
      data:
        message: "Watchdog: Growatt SOC nedostupny 5 min, restartuji modbus bridge"
        level: warning
    - alias: "Restart modbus TCP/RTU bridge"
      service: button.press
      target:
        entity_id: button.modbus_tcp_rtu_bridge_restart
    - alias: "Cekej az se sensor obnovi (max 10 min)"
      wait_for_trigger:
        - platform: state
          entity_id: sensor.growatt_battery_battery_soc
          not_to:
            - "unavailable"
            - "unknown"
      timeout:
        minutes: 10
      continue_on_timeout: true
  mode: single
  max_exceeded: silent

- id: watchdog_rs485_gbo
  alias: "Watchdog - RS485 restart (GBO SOC nedostupny)"
  description: >
    Pokud je sensor.gbo_battery_soc nedostupny 5 minut,
    restartuje GBO pres solar switch (power-cycle)
    Plati jen kdyz je switch.gbo zapnuty.
  trigger:
    - platform: state
      entity_id: sensor.gbo_battery_soc
      to: "unavailable"
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: switch.gbo
      state: "on"
  action:
    - alias: "Loguj restart"
      service: system_log.write
      data:
        message: "Watchdog: GBO SOC nedostupny 5 min, restartuji solar switch"
        level: warning
    - alias: "Vypni solar switch"
      service: switch.turn_off
      target:
        entity_id: switch.gbo
    - alias: "Cekej 5 sekund"
      delay:
        seconds: 5
    - alias: "Zapni solar switch"
      service: switch.turn_on
      target:
        entity_id: switch.gbo
    - alias: "Cekej az se sensor obnovi (max 10 min)"
      wait_for_trigger:
        - platform: state
          entity_id: sensor.gbo_battery_soc
          not_to:
            - "unavailable"
            - "unknown"
      timeout:
        minutes: 10
      continue_on_timeout: true
  mode: single
  max_exceeded: silent

# =============================================================================
# GBO ExternControl - input_select → modbus zápis
# Při změně input_select.gbo_extern_control zapíše správnou hodnotu na addr 14
# RAM registr = neomezený počet zápisů
# =============================================================================

- id: gbo_extern_control_write
  alias: "GBO - write ExternControl from input_select"
  trigger:
    - platform: state
      entity_id: input_select.gbo_extern_control
  action:
    - service: script.gbo_set_extern_control
      data:
        mode: "{{ trigger.to_state.state }}"
  mode: single

- id: gbo_extern_control_sync
  alias: "GBO - sync ExternControl sensor → input_select"
  trigger:
    - platform: state
      entity_id: sensor.gbo_extern_control_state
      not_to:
        - unavailable
        - unknown
  action:
    - service: script.gbo_sync_extern_control
  mode: single

- id: gbo_modbus_stop_sunset
  alias: "GBO modbus stop - switch.gbo off"
  trigger:
    - platform: state
      entity_id: switch.gbo
      to: "off"
  action:
    - action: modbus.stop
      data:
        hub: greenbono


- id: gbo_modbus_start_sunrise
  alias: "GBO modbus start - switch.gbo on"
  trigger:
    - platform: state
      entity_id: switch.gbo
      to: "on"
  mode: single
  action:
    - action: modbus.reload

    - delay: "00:00:10"

    # reg 0: minute<<8 | second
    - action: modbus.write_register
      data:
        hub: greenbono
        unit: 3
        address: 0
        value: >-
          {{ (now().minute * 256 + now().second) | int }}

    # reg 1: wday<<8 | hour
    - action: modbus.write_register
      data:
        hub: greenbono
        unit: 3
        address: 1
        value: >-
          {{ ((now().isoweekday() % 7) * 256 + now().hour) | int }}

    # Obnov SOC cil po startu GBO (EEPROM se po restartu resetuje na FLASH backup)
    - service: script.gbo_set_soc_target
      data:
        soc_percent: 94

    # Sync ExternControl sensor → input_select po startu
    - service: script.gbo_sync_extern_control

# =============================================================================
# GBO - vypni kdyz uz moc solar predikce nezbyva
# Pokud remaining energy prediction je nizka a SOC < 80%, vypni GBO
# protoze uz nema cenu vytezovat baterku na prebytky
# =============================================================================

- id: gbo_off_low_solar_remaining
  alias: "GBO - vypni pri nizke solar predikci"
  description: >
    Vypni switch.gbo kdyz energy_production_today_remaining je nizka.
    GBO vytezuje baterku na prebytky, obcas je potreba dovolit rebalance na 100% SOC.
  trigger:
    - platform: numeric_state
      entity_id: sensor.energy_production_today_remaining
      below: 1
  condition:
    - condition: state
      entity_id: switch.gbo
      state: "on"
  action:
    - alias: "Loguj vypnuti GBO"
      service: system_log.write
      data:
        message: >
          GBO: Solar remaining {{ states('sensor.energy_production_today_remaining') }} kWh,
          SOC {{ states('sensor.growatt_battery_battery_soc') }}%%, vypínam switch.gbo
        level: info
    - service: switch.turn_off
      target:
        entity_id: switch.gbo
  mode: single
