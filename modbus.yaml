####################################
###   GBO-Aku (GreenBono)        ###
####################################
# Modbus RTU over TCP via WiFi module
# Slave address: 1 (default)
# RAM registers (addr 0-19): unlimited writes
# EEPROM registers (addr 20+): limited writes, requires confirmation packet to addr 76 (0x55AA)
- name: greenbono
  type: rtuovertcp
  host: 192.168.2.18
  port: 6770
  message_wait_milliseconds: 350  # GBO-Aku doc: min 350ms response window
  timeout: 3                      # seconds, RTU over TCP needs extra time

  sensors:
    # Current L1 (kalibrovaná hodnota) [deciAmpéry]
    - name: GBO Current L1
      unique_id: gbo_current_l1
      device_class: current
      unit_of_measurement: A
      slave: 3
      address: 8
      input_type: input
      data_type: int16
      scale: 0.1
      precision: 1

    # Voltage L1
    - name: GBO Voltage L1
      unique_id: gbo_voltage_l1
      device_class: voltage
      unit_of_measurement: V
      slave: 3
      address: 16
      input_type: input
      data_type: uint16
      precision: 0

    # SSR boiler output - reg 18: upper byte = SamplesCnt, lower byte = SSR fire count (0..2*SamplesCnt)
    # bitmask not supported in HA modbus - read raw, template sensor extracts lower byte
    - name: GBO SSR Raw
      unique_id: gbo_ssr_raw
      slave: 3
      address: 18
      input_type: input
      data_type: uint16
      precision: 0

    # Battery SOC from GBO (raw value, no DC sensors needed)
    - name: GBO Battery SOC
      unique_id: gbo_battery_soc
      device_class: battery
      unit_of_measurement: "%"
      slave: 3
      address: 74
      input_type: input
      data_type: uint16
      precision: 0

    # Battery current raw (-512...511 digits) - possibly charging current
    - name: GBO Battery Current Raw
      unique_id: gbo_battery_current_raw
      slave: 3
      address: 78
      input_type: input
      data_type: int16
      precision: 0

    # EEUdcPIParam - raw hodnota (holding addr 100)
    # dolni byte = kompenzacni konstanta EMF baterie
    # horni byte = dovoleny odber ze site
    - name: GBO EEUdcPIParam Raw
      unique_id: gbo_eeudcpiparam_raw
      slave: 3
      address: 100
      input_type: holding
      data_type: uint16

    # EEIzadLimit - raw hodnota (holding addr 102)
    # dolni byte = limit proudu dle velikosti menice (tovarni)
    # horni byte = max nabijeci proud baterie (digits, scale 0.4 A/digit)
    - name: GBO EEIzadLimit Raw
      unique_id: gbo_eeizadlimit_raw
      slave: 3
      address: 102
      input_type: holding
      data_type: uint16

    # EEUdcZadana - raw hodnota (holding addr 98)
    # dolni byte = SOC* cil regulace (0-255 = 0-100% SOC)
    # horni byte = bod zalomeni U/I charakteristiky (255 = nabijej na plno)
    - name: GBO EEUdcZadana Raw
      unique_id: gbo_eeudczadana_raw
      slave: 3
      address: 98
      input_type: holding
      data_type: uint16

    # ExternControl - aktuální hodnota (pro diagnostiku)
    # 0x3F00=16128 regulace, 0xBF00=48896 vše zapnuto, 0x7F00=32512 vše vypnuto
    - name: GBO Extern Control State
      unique_id: gbo_extern_control_state
      slave: 3
      address: 14
      input_type: holding
      data_type: uint16

    # RelaisStatus - raw hodnota pro template binary_sensors
    - name: GBO Relay Status Raw
      unique_id: gbo_relay_status_raw
      slave: 3
      address: 10
      input_type: holding
      data_type: uint16
      precision: 0
