gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše SOC cíl do EEUdcZadana (addr 98) + EEPROM potvrzení (addr 76) v jednom TCP spojení."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"

    # Uvolni TCP spojeni - GBO WiFi modul akceptuje jen 1 spojeni
    - service: modbus.stop
      data:
        hub: greenbono

    - delay: "00:00:01"

    # Python script: oba zapisy v jednom TCP spojeni bez pymodbus retry problemu
    - service: shell_command.gbo_modbus_fc16
      data:
        soc: "{{ soc_percent | int }}"
        upper: "{{ upper_byte | int }}"

    - delay: "00:00:01"

    - service: modbus.reload
