gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše SOC cíl do EEUdcZadana (addr 98) + EEPROM potvrzení (addr 76)."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"
        new_value: "{{ upper_byte * 256 + (soc_percent | int) }}"

    - service: modbus.stop
      data:
        hub: greenbono

    - delay: "00:00:01"

    - service: shell_command.gbo_modbus_fc16
      data:
        address: 98
        value: "{{ new_value | int }}"

    - delay: "00:00:01"

    - service: modbus.reload

gbo_set_extern_control:
  alias: "GBO: Nastav ExternControl (addr 14, RAM)"
  description: "Zapíše režim do holding addr 14. RAM registr = neomezené zápisy, FC6 stačí."
  fields:
    mode:
      description: "regulation / force_on / force_off"
      example: regulation
      selector:
        select:
          options:
            - regulation
            - force_on
            - force_off
  sequence:
    - service: modbus.write_register
      data:
        hub: greenbono
        slave: 3
        address: 14
        value: >
          {% set values = {
            'force_on':   0xBF00,
            'force_off':  0x7F00,
            'regulation': 0x3F00
          } %}
          {{ values.get(mode, 0x3F00) }}

gbo_sync_extern_control:
  alias: "GBO: Sync ExternControl sensor → input_select"
  description: "Přečte aktuální hodnotu sensoru a aktualizuje input_select (jen pokud se liší)."
  sequence:
    - variables:
        val: "{{ states('sensor.gbo_extern_control_state') | int(-1) }}"
        new_mode: >
          {% set modes = {
            0xBF00: 'force_on',
            0x7F00: 'force_off',
            0x3F00: 'regulation'
          } %}
          {{ modes.get(val, '') }}
        current_mode: "{{ states('input_select.gbo_extern_control') }}"

    # Pokud sensor nema platnou hodnotu nebo uz input_select sedi, nedela nic
    - condition: template
      value_template: "{{ new_mode != '' and new_mode != current_mode }}"

    - service: input_select.select_option
      target:
        entity_id: input_select.gbo_extern_control
      data:
        option: "{{ new_mode }}"
