gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše SOC cíl do EEUdcZadana (addr 98) přes FC16 a potvrdí EEPROM (addr 76)."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"
        new_value: "{{ upper_byte * 256 + (soc_percent | int) }}"

    # Uvolni TCP spojeni - GBO WiFi modul akceptuje jen 1 spojeni
    - service: modbus.stop
      data:
        hub: greenbono

    - delay: "00:00:01"

    # FC16: addr 98 (SOC cil) + addr 76 (EEPROM potvrzeni) v jednom TCP spojeni
    - service: shell_command.gbo_modbus_fc16
      data:
        address: "soc"
        value: "{{ soc_percent | int }}"

    - delay: "00:00:01"

    # Obnov modbus hub
    - service: modbus.reload
