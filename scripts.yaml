gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše SOC cíl do EEUdcZadana (addr 98) přes FC16 a potvrdí EEPROM (addr 76)."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"
        new_value: "{{ upper_byte * 256 + (soc_percent | int) }}"

    # FC16 pres Python script - HA write_register pouziva FC6, GBO podporuje jen FC16
    - service: shell_command.gbo_modbus_fc16
      data:
        address: 98
        value: "{{ new_value }}"

    - delay: "00:00:01"

    # EEPROM potvrzeni bezprostredne po zapisu (addr 76 = ChkSumEE = 0x55AA = 21930)
    - service: shell_command.gbo_modbus_fc16
      data:
        address: 76
        value: 21930
