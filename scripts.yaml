gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše nový SOC cíl do EEUdcZadana (addr 98) a potvrdí EEPROM zápis."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"
        new_value: "{{ upper_byte * 256 + (soc_percent | int) }}"

    # EEPROM unlock - musi byt pred zapisem dat
    - service: modbus.write_register
      data:
        hub: greenbono
        slave: 3
        address: 76
        value: 21930

    - delay: "00:00:01"

    - service: modbus.write_register
      data:
        hub: greenbono
        slave: 3
        address: 98
        value: "{{ new_value }}"
