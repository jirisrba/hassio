gbo_set_soc_target:
  alias: "GBO: Nastav SOC cíl regulace"
  description: "Zapíše nový SOC cíl do EEUdcZadana (addr 98) přes number entitu (FC16) a potvrdí EEPROM."
  fields:
    soc_percent:
      description: "Cílový SOC v % (0–100)"
      example: 95
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
  sequence:
    - variables:
        current_raw: "{{ states('sensor.gbo_eeudczadana_raw') | int(0) }}"
        upper_byte: "{{ current_raw // 256 }}"
        new_value: "{{ upper_byte * 256 + (soc_percent | int) }}"

    # FC16 pres number entitu (write_register pouziva FC6, GBO podporuje jen FC16)
    - service: number.set_value
      target:
        entity_id: number.gbo_eeudczadana_write
      data:
        value: "{{ new_value }}"

    - delay: "00:00:01"

    # EEPROM potvrzeni - bezprostredne po zapisu dat
    - service: number.set_value
      target:
        entity_id: number.gbo_chksumee_write
      data:
        value: 21930
